<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>JurisRAG</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

    <div class="main-layout">

        <!-- =========================
             SIDEBAR
        ========================== -->

        <div class="sidebar">

            <h2>📂 Documents</h2>

            <div id="pdfList"
                 class="pdf-list">

                Loading PDFs...

            </div>

        </div>


        <!-- =========================
             CHAT SECTION
        ========================== -->

        <div class="container">

            <!-- TOP BAR -->

            <div class="top-bar">

                <h1>📘 JurisRAG</h1>

                <p>
                    AI powered legal assistant
                </p>

            </div>


            <!-- CHAT AREA -->

            <div class="chat-area"
                 id="chatArea">

                <div class="bot-message">

                    Welcome to JurisRAG 🚀

                </div>

            </div>


            <!-- INPUT SECTION -->

            <div class="input-section">

                <form id="chatForm">

                    <textarea
                        id="query"
                        name="query"
                        placeholder="Ask something about your legal documents..."
                        required
                    ></textarea>

                    <input
                        type="file"
                        id="pdf"
                        name="pdf"
                        accept="application/pdf"
                    >

                    <button
                        type="submit"
                        id="askButton"
                    >
                        Ask
                    </button>

                </form>

            </div>

        </div>

    </div>


    <!-- =========================
         DELETE MODAL
    ========================== -->

    <div id="deleteModal"
         class="modal">

        <div class="modal-content">

            <h2>
                Delete PDF
            </h2>

            <p id="deleteMessage">
                Are you sure?
            </p>

            <div class="modal-buttons">

                <button
                    class="cancel-btn"
                    onclick="closeDeleteModal()"
                >
                    Cancel
                </button>

                <button
                    class="confirm-delete-btn"
                    onclick="confirmDeletePDF()"
                >
                    Delete
                </button>

            </div>

        </div>

    </div>


    <!-- =========================
         SCRIPT FILE
    ========================== -->

    <script src="/static/script.js"></script>

</body>

</html>

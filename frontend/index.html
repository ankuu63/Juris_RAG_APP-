<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JurisRAG</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>📘 JurisRAG : AI powered legal assistant</h1>

        <!-- FORM -->
        <form id="chatForm">

            <!-- QUERY -->
            <label for="query">Enter your query:</label>

            <textarea
                id="query"
                name="query"
                rows="4"
                required
            ></textarea>

            <!-- PDF -->
            <label for="pdf">Upload PDF (optional):</label>

            <input
                type="file"
                id="pdf"
                name="pdf"
                accept="application/pdf"
            >

            <!-- BUTTON -->
            <button type="submit">
                Ask
            </button>

        </form>

        <!-- RESPONSE -->
        <div id="responseBox">

            <h2>Answer:</h2>

            <p id="answerText">
                Answer is cooking.....
            </p>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        const form = document.getElementById("chatForm");

        form.addEventListener("submit", async function (e) {

            e.preventDefault();

            const responseBox =
                document.getElementById("answerText");

            responseBox.textContent =
                "⏳ Processing... please wait";

            try {

                // FORM DATA
                const formData = new FormData();

                formData.append(
                    "query",
                    document.getElementById("query").value
                );

                // PDF FILE
                const pdfFile =
                    document.getElementById("pdf").files[0];

                if (pdfFile) {
                    formData.append("pdf", pdfFile);
                }

                // FETCH REQUEST
                const response = await fetch("/chat", {
                    method: "POST",
                    body: formData
                });

                // GET RAW RESPONSE
                const text = await response.text();

                try {

                    // TRY JSON PARSE
                    const data = JSON.parse(text);

                    if (response.ok) {

                        responseBox.textContent =
                            data.answer || "No response found.";

                    } else {

                        responseBox.textContent =
                            "⚠️ Error: " +
                            (data.error || "Unknown error");

                    }

                } catch (jsonError) {

                    // NON JSON RESPONSE
                    responseBox.textContent =
                        "❌ Backend returned non-JSON response:\n\n"
                        + text;

                }

            } catch (error) {

                // NETWORK ERROR
                responseBox.textContent =
                    "❌ Network Error:\n\n" + error;

            }

        });

    </script>

</body>
</html>

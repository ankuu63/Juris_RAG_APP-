<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>JurisRAG</title>

    <link rel="stylesheet"
          href="/static/workspace/style.css">

</head>

<body>

    <!-- TOP NAVBAR -->

    <div class="top-navbar">

        <div class="brand-section">

            <img
                src="/static/workspace/assets/logo.jpg"
                class="brand-logo"
            >

            <h1>
                Legistral
            </h1>

        </div>

        <div class="top-right">

            <button class="upgrade-btn">
                ⭐ Upgrade
            </button>

            <div class="user-profile">

                <div class="avatar">
                    A
                </div>

                <span>
                    Aman
                </span>

            </div>

        </div>

    </div>


    <!-- MAIN LAYOUT -->

    <div class="main-layout">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="sidebar-header">

                <h2>
                    Documents
                </h2>

                <button class="add-btn">
                    +
                </button>

            </div>


            <div id="pdfList"
                 class="pdf-list">

            </div>

        </div>


        <!-- CHAT CONTAINER -->

        <div class="container">

            <!-- TOP BAR -->

            <div class="top-bar">

                <div class="top-left">

                    <img
                        src="/static/workspace/assets/icon.jpg"
                        class="workspace-icon"
                    >

                    <div>

                        <h1>
                            JurisRAG
                        </h1>

                        <p id="currentPDFText">
                            AI powered legal assistant
                        </p>

                    </div>

                </div>


                <div class="top-actions">

                    <button class="icon-btn">

                        <img
                            src="/static/workspace/assets/share-icon.jpg"
                            class="top-icon"
                        >

                    </button>

                    <button class="icon-btn">

                        <img
                            src="/static/workspace/assets/copy-icon.jpg"
                            class="top-icon"
                        >

                    </button>

                </div>

            </div>


            <!-- CHAT AREA -->

            <div class="chat-area"
                 id="chatArea">

                <div class="bot-message">

                    Welcome to JurisRAG 🚀

                </div>

            </div>


            <!-- INPUT SECTION -->

            <div class="input-section">

                <form id="chatForm">

                    <!-- FILE UPLOAD -->

                    <label for="pdf"
                           class="upload-btn">

                        <img
                            src="/static/workspace/assets/pin-icon.jpg"
                            class="pin-icon"
                        >

                    </label>


                    <input
                        type="file"
                        id="pdf"
                        name="pdf"
                        accept="application/pdf"
                    >


                    <div id="selectedFileName"
                         class="selected-file-name">
                    </div>


                    <!-- QUERY -->

                    <textarea
                        id="query"
                        name="query"
                        placeholder="Ask something about your legal documents..."
                        required
                    ></textarea>


                    <!-- ASK BUTTON -->

                    <button
                        type="submit"
                        id="askButton"
                    >
                        Ask
                    </button>

                </form>

            </div>

        </div>

    </div>


    <!-- DELETE MODAL -->

    <div id="deleteModal"
         class="modal">

        <div class="modal-content">

            <h2>
                Delete PDF
            </h2>

            <p id="deleteMessage">
                Are you sure?
            </p>

            <div class="modal-buttons">

                <button
                    class="cancel-btn"
                    onclick="closeDeleteModal()"
                >
                    Cancel
                </button>

                <button
                    class="confirm-delete-btn"
                    onclick="confirmDeletePDF()"
                >
                    Delete
                </button>

            </div>

        </div>

    </div>


    <script src="/static/workspace/script.js"></script>

</body>

</html>
